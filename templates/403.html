{% extends "base.html" %}

{% block title %}Accesso Negato{% endblock %}

{% block content %}
<div class="container mt-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-body py-5">
                    <h1 class="display-4 text-danger mb-3"><i class="bi bi-shield-lock"></i> 403</h1>
                    <h2 class="h4 mb-4">Accesso Negato</h2>
                    <p class="text-muted mb-4">
                        {% if exception %}
                            {{ exception }}
                        {% else %}
                            Non hai i permessi necessari per visualizzare questa pagina o eseguire questa azione.
                        {% endif %}
                    </p>
                    <a href="{% url 'home' %}" class="btn btn-primary px-4 rounded-pill">Torna alla Home</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
